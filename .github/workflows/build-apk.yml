name: Build Debug APK

on:
  push:
    tags:
      - '*'

jobs:
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
      version: ${{ steps.env.outputs.version }}
    steps:
      - name: Determine environment and version from tag
        id: env
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" != *-* ]]; then
            echo "::error::Tag must follow the format {environment}-{version} (e.g. test-1.0.0)"
            exit 1
          fi
          PREFIX=$(echo "$TAG" | cut -d'-' -f1)
          VERSION=$(echo "$TAG" | cut -d'-' -f2-)
          echo "name=$PREFIX" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets and variables
        env:
          SECRET_GOOGLE_SERVICE_CONTENT: ${{ secrets.GOOGLE_SERVICE_CONTENT }}
          SECRET_MOBILE_APP_KEY: ${{ secrets.MOBILE_APP_KEY }}
          SECRET_MOBILE_APP_SECRET: ${{ secrets.MOBILE_APP_SECRET }}
          SECRET_MOBILE_APP_CONSUMER: ${{ secrets.MOBILE_APP_CONSUMER }}
          VAR_BASE_URL: ${{ vars.BASE_URL }}
          VAR_PRODUCER_ID: ${{ vars.PRODUCER_ID }}
          SECRET_AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SECRET_AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          VAR_AZURE_CONTAINER_NAME: ${{ vars.AZURE_CONTAINER_NAME }}
        run: |
          ENV="${{ needs.determine-env.outputs.environment }}"
          MISSING=()
          [ -z "$SECRET_GOOGLE_SERVICE_CONTENT" ] && MISSING+=("GOOGLE_SERVICE_CONTENT")
          [ -z "$SECRET_MOBILE_APP_KEY" ] && MISSING+=("MOBILE_APP_KEY")
          [ -z "$SECRET_MOBILE_APP_SECRET" ] && MISSING+=("MOBILE_APP_SECRET")
          [ -z "$SECRET_MOBILE_APP_CONSUMER" ] && MISSING+=("MOBILE_APP_CONSUMER")
          [ -z "$VAR_BASE_URL" ] && MISSING+=("BASE_URL")
          [ -z "$VAR_PRODUCER_ID" ] && MISSING+=("PRODUCER_ID")
          [ -z "$SECRET_AZURE_STORAGE_ACCOUNT" ] && MISSING+=("AZURE_STORAGE_ACCOUNT")
          [ -z "$SECRET_AZURE_STORAGE_KEY" ] && MISSING+=("AZURE_STORAGE_KEY")
          [ -z "$VAR_AZURE_CONTAINER_NAME" ] && MISSING+=("AZURE_CONTAINER_NAME")
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::Missing required secrets/variables for '$ENV' environment: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets and variables present for '$ENV' environment"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and accept licenses
        run: |
          COMPILE_SDK=$(grep 'compileSdkVersion' android/variables.gradle | awk -F'= ' '{print $2}')
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-${COMPILE_SDK}"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Convert Windows line endings in gradlew
        run: sudo apt update && sudo apt install dos2unix && cd android && dos2unix ./gradlew && cd ..

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode google-services.json
        id: decode_google_services
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'google-services.json'
          fileDir: '${{ github.workspace }}/android/app/'
          encodedString: ${{ secrets.GOOGLE_SERVICE_CONTENT }}

      - name: Replace secrets in gradle.properties
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          MOBILE_APP_KEY: ${{ secrets.MOBILE_APP_KEY }}
          MOBILE_APP_SECRET: ${{ secrets.MOBILE_APP_SECRET }}
          MOBILE_APP_CONSUMER: ${{ secrets.MOBILE_APP_CONSUMER }}
          PRODUCER_ID: ${{ vars.PRODUCER_ID }}
          APP_VERSION: ${{ needs.determine-env.outputs.version }}
        run: |
          python3 - <<'EOF'
          import os
          from pathlib import Path

          props = Path('android/gradle.properties')
          replacements = {
              'base_url': os.environ['BASE_URL'],
              'mobile_app_key': os.environ['MOBILE_APP_KEY'],
              'mobile_app_secret': os.environ['MOBILE_APP_SECRET'],
              'mobile_app_consumer': os.environ['MOBILE_APP_CONSUMER'],
              'producer_id': os.environ['PRODUCER_ID'],
              'app_version': os.environ['APP_VERSION'],
          }
          lines = props.read_text().splitlines(keepends=True)
          result = []
          for line in lines:
              key = line.split('=', 1)[0].strip()
              if key in replacements:
                  result.append(f'{key}={replacements[key]}\n')
              else:
                  result.append(line)
          props.write_text(''.join(result))
          EOF

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Verify APK was created
        run: |
          APK_FILES=$(find android/app/build/outputs/apk/debug/ -name "*.apk" | wc -l)
          if [ "$APK_FILES" -eq 0 ]; then
            echo "APK file not found!"
            ls -la android/app/build/outputs/apk/debug/ || echo "Debug directory does not exist"
            exit 1
          fi
          echo "APK files found:"
          find android/app/build/outputs/apk/debug/ -name "*.apk" -exec ls -la {} \;

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload APK to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            APK_FILE=$(find android/app/build/outputs/apk/debug/ -name "*.apk" | head -1)
            if [ -z "$APK_FILE" ]; then
              echo "APK file not found!"
              exit 1
            fi

            echo "Uploading APK file: $APK_FILE"

            az storage blob upload \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
              --container-name "${{ vars.AZURE_CONTAINER_NAME }}" \
              --file "$APK_FILE" \
              --name "sunbird-${{ needs.determine-env.outputs.environment }}-${{ needs.determine-env.outputs.version }}-${{ github.run_number }}-debug.apk" \
              --overwrite

            echo "APK uploaded: sunbird-${{ needs.determine-env.outputs.environment }}-${{ needs.determine-env.outputs.version }}-${{ github.run_number }}-debug.apk"

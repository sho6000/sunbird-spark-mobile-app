name: Build Release AAB

on:
  push:
    tags:
      - '*'

jobs:
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
      version: ${{ steps.env.outputs.version }}
    steps:
      - name: Determine environment and version from tag
        id: env
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" != *-* ]]; then
            echo "::error::Tag must follow the format {environment}-{version} (e.g. test-1.0.0)"
            exit 1
          fi
          PREFIX=$(echo "$TAG" | cut -d'-' -f1)
          VERSION=$(echo "$TAG" | cut -d'-' -f2-)
          echo "name=$PREFIX" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets and variables
        env:
          SECRET_GOOGLE_SERVICE_CONTENT: ${{ secrets.GOOGLE_SERVICE_CONTENT }}
          SECRET_KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRET_SIGNING_KEYS: ${{ secrets.SIGNING_KEYS }}
          SECRET_MOBILE_APP_KEY: ${{ secrets.MOBILE_APP_KEY }}
          SECRET_MOBILE_APP_SECRET: ${{ secrets.MOBILE_APP_SECRET }}
          SECRET_MOBILE_APP_CONSUMER: ${{ secrets.MOBILE_APP_CONSUMER }}
          VAR_BASE_URL: ${{ vars.BASE_URL }}
          VAR_PRODUCER_ID: ${{ vars.PRODUCER_ID }}
        run: |
          ENV="${{ needs.determine-env.outputs.environment }}"
          MISSING=()
          [ -z "$SECRET_GOOGLE_SERVICE_CONTENT" ] && MISSING+=("GOOGLE_SERVICE_CONTENT")
          [ -z "$SECRET_KEYSTORE" ] && MISSING+=("KEYSTORE")
          [ -z "$SECRET_SIGNING_KEYS" ] && MISSING+=("SIGNING_KEYS")
          [ -z "$SECRET_MOBILE_APP_KEY" ] && MISSING+=("MOBILE_APP_KEY")
          [ -z "$SECRET_MOBILE_APP_SECRET" ] && MISSING+=("MOBILE_APP_SECRET")
          [ -z "$SECRET_MOBILE_APP_CONSUMER" ] && MISSING+=("MOBILE_APP_CONSUMER")
          [ -z "$VAR_BASE_URL" ] && MISSING+=("BASE_URL")
          [ -z "$VAR_PRODUCER_ID" ] && MISSING+=("PRODUCER_ID")
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::Missing required secrets/variables for '$ENV' environment: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets and variables present for '$ENV' environment"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and accept licenses
        run: |
          COMPILE_SDK=$(grep 'compileSdkVersion' android/variables.gradle | awk -F'= ' '{print $2}')
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-${COMPILE_SDK}"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Convert Windows line endings in gradlew
        run: sudo apt update && sudo apt install dos2unix && cd android && dos2unix ./gradlew && cd ..

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode google-services.json
        id: decode_google_services
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'google-services.json'
          fileDir: '${{ github.workspace }}/android/app/'
          encodedString: ${{ secrets.GOOGLE_SERVICE_CONTENT }}

      - name: Replace secrets in gradle.properties
        run: |
          sed -i "s|^base_url=.*|base_url=${{ vars.BASE_URL }}|" android/gradle.properties
          sed -i "s|^mobile_app_key=.*|mobile_app_key=${{ secrets.MOBILE_APP_KEY }}|" android/gradle.properties
          sed -i "s|^mobile_app_secret=.*|mobile_app_secret=${{ secrets.MOBILE_APP_SECRET }}|" android/gradle.properties
          sed -i "s|^mobile_app_consumer=.*|mobile_app_consumer=${{ secrets.MOBILE_APP_CONSUMER }}|" android/gradle.properties
          sed -i "s|^producer_id=.*|producer_id=${{ vars.PRODUCER_ID }}|" android/gradle.properties

      - name: Decode keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'android_keystore.jks'
          fileDir: '${{ github.workspace }}/android/app/keystore/'
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Create signing.properties from JSON secret
        run: |
          mkdir -p ${{ github.workspace }}/android/app/keystore

          trap 'rm -f signing.json' EXIT

          echo "${{ secrets.SIGNING_KEYS }}" | base64 --decode > signing.json

          SIGNING_STORE_PASSWORD=$(jq -r '.SIGNING_STORE_PASSWORD' signing.json)
          SIGNING_KEY_ALIAS=$(jq -r '.SIGNING_KEY_ALIAS' signing.json)
          SIGNING_KEY_PASSWORD=$(jq -r '.SIGNING_KEY_PASSWORD' signing.json)

          touch ${{ github.workspace }}/android/signing.properties
          echo "KEYSTORE=${{ github.workspace }}/android/app/keystore/android_keystore.jks" >> ${{ github.workspace }}/android/signing.properties
          echo "SIGNING_STORE_PASSWORD=$SIGNING_STORE_PASSWORD" >> ${{ github.workspace }}/android/signing.properties
          echo "SIGNING_KEY_ALIAS=$SIGNING_KEY_ALIAS" >> ${{ github.workspace }}/android/signing.properties
          echo "SIGNING_KEY_PASSWORD=$SIGNING_KEY_PASSWORD" >> ${{ github.workspace }}/android/signing.properties

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build release AAB
        run: cd android && ./gradlew bundleRelease --stacktrace

      - name: Verify AAB was created
        run: |
          AAB_FILES=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | wc -l)
          if [ "$AAB_FILES" -eq 0 ]; then
            echo "AAB file not found!"
            ls -la android/app/build/outputs/bundle/release/ || echo "Release directory does not exist"
            exit 1
          fi
          echo "AAB files found:"
          find android/app/build/outputs/bundle/release/ -name "*.aab" -exec ls -la {} \;

      - name: Upload release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload AAB to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -1)
            if [ -z "$AAB_FILE" ]; then
              echo "AAB file not found!"
              exit 1
            fi

            echo "Uploading AAB file: $AAB_FILE"

            az storage blob upload \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
              --container-name "${{ vars.AZURE_CONTAINER_NAME }}" \
              --file "$AAB_FILE" \
              --name "sunbird-${{ needs.determine-env.outputs.environment }}-${{ needs.determine-env.outputs.version }}-${{ github.run_number }}.aab" \
              --overwrite

            echo "AAB uploaded: sunbird-${{ needs.determine-env.outputs.environment }}-${{ needs.determine-env.outputs.version }}-${{ github.run_number }}.aab"
